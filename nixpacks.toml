# ════════════════════════════════════════════════════════════
#  Nixpacks 配置 — 简化版（让 Railway 自动识别 Python）
# ════════════════════════════════════════════════════════════

[providers]
python = "3.11"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
NIXPACKS_PYTHON_VERSION = "3.11"

# 用清华 pip 镜像加速（中国到 PyPI 官方源比较慢）
[phases.install]
cmds = ["pip install -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple --no-cache-dir --upgrade"]
