# ════════════════════════════════════════════════════════════
#  Railway.app — Railway 项目配置
#  文档: https://docs.railway.app/reference/config-as-code
# ════════════════════════════════════════════════════════════

[build]
builder = "NIXPACKS"   # 使用 Railway 内置的 Nixpacks（自动识别 Python）
# 如果想用 Dockerfile，改为: builder = "DOCKERFILE"

[deploy]
startCommand = "bash start.sh"
numReplicas = 1
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
# 完全关闭健康检查 — Railway 不再等待 /healthz，绑端口即对外服务
# （BGE 模型首次懒加载，不阻塞 /healthz；首次聊天才下载）
healthcheckPath = ""
# 部署超时（秒），首次部署要下载依赖和模型，时间宽松一点
deployTimeout = 1800
